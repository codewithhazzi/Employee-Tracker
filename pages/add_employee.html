<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Employees - TrackerPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen flex relative selection:bg-indigo-500 selection:text-white">

    <!-- Ambient Background Blobs -->
    <div class="fixed top-0 right-[-10%] w-[600px] h-[600px] bg-indigo-200/40 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-emerald-100/40 rounded-full blur-[100px] pointer-events-none z-0"></div>

    <!-- Sidebar -->
    <aside class="w-[280px] bg-slate-900 border-r border-slate-800 flex flex-col hidden sm:flex z-20 relative">
        <div class="p-8">
            <h1 class="text-3xl font-black tracking-tighter text-indigo-400 flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 text-white flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                Tracker<span class="text-white">Pro</span>
            </h1>
        </div>
        
        <div class="px-6 pb-4">
            <div class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 pl-2">Menu</div>
            <nav class="space-y-1.5">
                <a href="../index.html" class="group flex items-center gap-4 px-4 py-3.5 text-slate-400 hover:bg-slate-800 hover:text-white rounded-2xl transition-all font-medium">
                    <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="add.html" class="group flex items-center gap-4 px-4 py-3.5 text-slate-400 hover:bg-slate-800 hover:text-white rounded-2xl transition-all font-medium">
                    <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    <span>Tracker</span>
                </a>
                <a href="add_employee.html" class="group flex items-center gap-4 px-4 py-3.5 bg-indigo-500 text-white rounded-2xl transition-all shadow-lg shadow-indigo-500/20 font-semibold relative overflow-hidden">
                    <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out"></div>
                    <svg class="w-5 h-5 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                    </svg>
                    <span class="relative z-10">Employees</span>
                </a>
                <a href="reports.html" class="group flex items-center gap-4 px-4 py-3.5 text-slate-400 hover:bg-slate-800 hover:text-white rounded-2xl transition-all font-medium">
                    <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    <span>Reports</span>
                </a>
            </nav>
        </div>
        
        <div class="mt-auto p-4 lg:p-6 pb-8">
            <div class="bg-slate-800/50 p-4 rounded-3xl border border-slate-700/50 flex items-center gap-3 transition-colors hover:bg-slate-800 cursor-pointer">
                <div class="profile-initial w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-500 to-emerald-400 flex items-center justify-center text-white font-bold text-sm shadow-md shrink-0">
                    -
                </div>
                <div class="flex flex-col min-w-0">
                    <span class="profile-name text-sm font-bold text-slate-100 truncate">Loading...</span>
                    <span class="profile-email text-xs text-slate-400 truncate">...</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative z-10">
        <!-- Transparent Header -->
        <header class="h-auto pt-10 pb-6 px-6 lg:px-12 flex items-center justify-between shrink-0">
            <div class="flex flex-col">
                <h2 class="text-3xl lg:text-4xl font-extrabold text-slate-800 tracking-tight">Organization</h2>
                <p class="text-slate-500 font-medium mt-1.5 text-sm lg:text-base">Manage and onboard your team members.</p>
            </div>

            <div class="flex items-center gap-4">
                <a href="#" data-logout class="flex items-center gap-2 px-4 py-2.5 bg-white/60 hover:bg-white text-slate-600 hover:text-indigo-600 font-bold rounded-2xl shadow-sm border border-slate-200/50 backdrop-blur-md transition-all hover:scale-105 active:scale-95" title="Logout">
                    <span class="hidden sm:inline-block">Logout</span>
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </a>
            </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-auto px-6 lg:px-12 pb-12 w-full custom-scrollbar">
            <div class="max-w-4xl mx-auto space-y-8 animate-fade-in-up mt-2">

                <!-- Add Employee Card -->
                <div class="bg-white/80 backdrop-blur-3xl rounded-[2.5rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white p-8 lg:p-10 transition-all duration-300 relative overflow-hidden group">
                    <div class="absolute -right-12 -top-12 w-64 h-64 bg-indigo-50/50 rounded-full blur-3xl group-hover:bg-indigo-100/50 transition-colors duration-500 pointer-events-none"></div>
                    
                    <div class="relative z-10 mb-8 flex justify-between items-start border-b border-slate-100/60 pb-6">
                        <div>
                            <h3 class="text-2xl font-black text-slate-800 flex items-center gap-3">
                                <div class="w-10 h-10 rounded-2xl bg-indigo-50 text-indigo-500 flex items-center justify-center border border-indigo-100/50">
                                    <svg class="w-5 h-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                                    </svg>
                                </div>
                                Onboard Employee
                            </h3>
                        </div>
                    </div>

                    <form id="add-employee-form" class="relative z-10 flex flex-col sm:flex-row gap-4">
                        <div class="relative flex-1">
                            <label class="absolute -top-3 left-4 bg-white px-2 text-[10px] font-bold uppercase text-indigo-500 rounded-full border border-indigo-100 z-10">Full Name</label>
                            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-slate-400 group-focus-within:text-indigo-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                            </div>
                            <input type="text" id="empName"
                                class="block w-full pl-12 pr-4 py-4 border-2 border-slate-200 rounded-2xl bg-white placeholder-slate-300 focus:outline-none focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all font-bold text-slate-700 shadow-sm"
                                placeholder="e.g. Liam Anderson" autocomplete="off" required>
                        </div>
                        <button type="submit"
                            class="inline-flex justify-center items-center px-8 py-4 border border-transparent text-base font-bold rounded-2xl shadow-lg shadow-indigo-500/30 text-white bg-indigo-500 hover:bg-indigo-600 hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-300 shrink-0">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path>
                            </svg>
                            Add Member
                        </button>
                    </form>
                </div>

                <!-- Employee List Card -->
                <div class="bg-white/80 backdrop-blur-3xl rounded-[2.5rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white overflow-hidden flex flex-col">
                    <div class="p-8 pb-6 border-b border-slate-100/60 flex justify-between items-center relative z-10">
                        <div>
                            <h3 class="text-2xl font-black text-slate-800">Team Roster</h3>
                        </div>
                        <div class="px-4 py-2 bg-emerald-50 text-emerald-700 rounded-full text-xs font-black tracking-widest uppercase border border-emerald-100 shadow-sm flex items-center gap-2">
                            <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                            <span id="empCountBadge">0 Active</span>
                        </div>
                    </div>

                    <div class="flex-1 p-0 custom-scrollbar overflow-y-auto max-h-[500px]">
                        <ul id="empList" class="divide-y divide-slate-100">
                            <!-- JS populated list -->
                        </ul>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script type="module" src="../assets/js/add_employee.js"></script>
    
    <!-- Custom CSS for Scrollbar inside main -->
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(99, 102, 241, 0.2);
            border-radius: 20px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: rgba(99, 102, 241, 0.4);
        }
    </style>
</body>
</html>
