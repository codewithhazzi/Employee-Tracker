<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Employees - TrackerPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="bg-slate-50/50 font-sans text-slate-800 antialiased min-h-screen flex">
  
    <!-- Sidebar -->
    <aside class="w-72 bg-slate-900 text-white flex flex-col hidden sm:flex shadow-2xl z-10">
        <div class="p-6 border-b border-slate-800/50">
            <h1 class="text-2xl font-bold tracking-tight text-indigo-400 flex items-center gap-2">
                <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                Tracker<span class="text-white">Pro</span>
            </h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="../index.html" class="group flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 rounded-xl transition-all border border-transparent">
                <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="font-medium">Dashboard</span>
            </a>
            <a href="add.html" class="group flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 rounded-xl transition-all border border-transparent">
                 <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <span class="font-medium text-sm">Tracker</span>
            </a>
            <a href="add_employee.html" class="group flex items-center gap-3 px-4 py-3 bg-indigo-600/20 text-indigo-300 rounded-xl transition-all border border-indigo-500/20">
                 <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                <span class="font-medium text-sm">Employees</span>
            </a>
            <a href="reports.html" class="group flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 rounded-xl transition-all border border-transparent">
                <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
               <span class="font-medium text-sm">Reports</span>
           </a>
        </nav>
        <div class="p-4 border-t border-slate-800/50">
            <div class="flex items-center gap-3 px-4 py-3 text-slate-400">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-white font-bold text-sm shadow-lg">
                    A
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-medium text-slate-200">Admin</span>
                    <span class="text-xs text-slate-500">admin@tracker.pro</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-md border-b border-slate-200/80 h-16 flex items-center justify-between px-8 shadow-[0_1px_3px_0_rgb(0,0,0,0.02)] shrink-0 z-10 sticky top-0">
            <div class="flex items-center gap-4">
                <h2 class="text-xl font-semibold text-slate-800 tracking-tight">Manage Employees</h2>
            </div>
            
            <div class="flex items-center gap-4">
                <a href="#" data-logout class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-colors" title="Logout">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </a>
            </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-auto p-4 sm:p-8 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMCwwLDAsMC4wMikiLz48L3N2Zz4=')]">
            <div class="max-w-4xl mx-auto space-y-6 animate-fade-in-up">
                
                <!-- Add Employee Card -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 p-6 sm:p-8 transition-all duration-300 relative overflow-hidden group">
                    <div class="relative z-10 mb-6 flex justify-between items-start">
                        <div>
                            <h3 class="text-lg font-semibold text-slate-800 flex items-center gap-2">
                                <svg class="w-5 h-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                                Onboard Employee
                            </h3>
                            <p class="text-slate-500 text-sm mt-1">Add a new team member to your organization.</p>
                        </div>
                    </div>
                    
                    <form id="add-employee-form" class="relative z-10 flex flex-col sm:flex-row gap-4">
                        <div class="relative flex-1">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-slate-400 group-focus-within:text-indigo-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                            </div>
                            <input 
                                type="text" 
                                id="empName" 
                                class="block w-full pl-11 pr-4 py-3.5 border border-slate-300 rounded-xl leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all font-medium text-slate-700" 
                                placeholder="e.g. Liam Anderson" 
                                autocomplete="off"
                                required
                            >
                        </div>
                        <button 
                            type="button" 
                            onclick="addEmployeePage()"
                            class="inline-flex justify-center items-center px-8 py-3.5 border border-transparent text-sm font-semibold rounded-xl shadow-[0_4px_14px_0_rgb(79,70,229,0.39)] text-white bg-indigo-600 hover:bg-indigo-700 hover:shadow-[0_6px_20px_rgba(79,70,229,0.23)] hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-200 shrink-0"
                        >
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            Add Member
                        </button>
                    </form>
                </div>

                <!-- Employee List Card -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden transition-all duration-300 flex flex-col">
                    <div class="p-6 sm:px-8 border-b border-slate-200/80 flex justify-between items-center bg-slate-50/30">
                        <div>
                            <h3 class="text-lg font-semibold text-slate-800">Team Roster</h3>
                        </div>
                        <div class="px-3 py-1.5 bg-indigo-50 text-indigo-700 rounded-full text-xs font-bold tracking-wide border border-indigo-100 shadow-sm flex items-center gap-1.5">
                            <span class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>
                            <span id="empCountBadge">0 Active</span>
                        </div>
                    </div>
                    
                    <div class="flex-1 p-0">
                        <ul id="empList" class="divide-y divide-slate-100">
                            <!-- JS populated list -->
                        </ul>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script type="module" src="../assets/js/add_employee.js"></script>
</body>
</html>
